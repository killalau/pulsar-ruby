plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "lib/pulsar/proto/**/*"
    - "vendor/**/*"
    - ".research/**/*"

Gemspec/DevelopmentDependencies:
  Enabled: false

Layout/LineLength:
  Max: 130

Metrics/AbcSize:
  Max: 40

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/MethodLength:
  Max: 25

Metrics/ParameterLists:
  Max: 8

RSpec/ExampleLength:
  Max: 80

RSpec/InstanceVariable:
  Enabled: false

RSpec/LeakyConstantDeclaration:
  Enabled: false

RSpec/DescribeClass:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 12

Lint/ConstantDefinitionInBlock:
  Exclude:
    - "spec/**/*"

Style/AccessorGrouping:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/IfUnlessModifier:
  Enabled: false

Style/KeywordParametersOrder:
  Enabled: false

Style/StringLiteralsInInterpolation:
  Enabled: false

Style/SymbolProc:
  Enabled: false
