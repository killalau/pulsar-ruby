plugins:
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.0
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "lib/pulsar/proto/**/*"
    - "vendor/**/*"
    - ".research/**/*"

Layout/LineLength:
  Max: 130

Metrics/AbcSize:
  Max: 40

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "*.gemspec"

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/MethodLength:
  Max: 25

Metrics/ParameterLists:
  Max: 8

RSpec/ExampleLength:
  Max: 80

RSpec/InstanceVariable:
  Enabled: false

RSpec/MultipleExpectations:
  Max: 12
