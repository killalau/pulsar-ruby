services:
  pulsar:
    image: apachepulsar/pulsar:4.2.1
    command: bin/pulsar standalone --no-functions-worker
    environment:
      PULSAR_MEM: "-Xms256m -Xmx512m -XX:MaxDirectMemorySize=256m"
    ports:
      - "6650:6650"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
